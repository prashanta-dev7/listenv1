name: Daily Social Listening Run

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC / 06:30 IST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-run
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run pipeline
        env:
          IG_SESSION_COOKIE: ${{ secrets.IG_SESSION_COOKIE }}
          FB_SESSION_COOKIE: ${{ secrets.FB_SESSION_COOKIE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run.py

      - name: Commit and push data
        run: |
          git config user.name  "aza-listener-bot"
          git config user.email "aza-listener-bot@users.noreply.github.com"
          git add data/ logs/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: daily run $(date -u +'%Y-%m-%d')"
            git push
          fi
